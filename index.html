<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Parlay Ticket Builder</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <meta name="apple-mobile-web-app-title" content="Parlay Builder">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Browser / Safari Favorites path. -->
  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="shortcut icon" href="./favicon.ico">
  <link rel="icon" type="image/png" sizes="64x64" href="./ssb_favicon_full_transparent_64.png">
  <link rel="icon" type="image/png" sizes="128x128" href="./ssb_favicon_full_transparent_128.png">

  <!-- iPhone Share Sheet / Add to Home Screen path. Dark-backed on purpose. -->
  <link rel="apple-touch-icon" sizes="180x180" href="./ssb_apple_touch_home_dark_180.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./ssb_apple_touch_home_dark_180.png">

  <!-- Manifest also points to dark-backed home-screen icons. -->
  <link rel="manifest" href="./manifest.json">

  <style>
    :root {
      --bg: #07111f;
      --line: rgba(148, 163, 184, 0.22);
      --text: #f8fafc;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    .shell {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .brand {
      display: none;
      flex: 0 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 14px 8px;
      border-bottom: 1px solid var(--line);
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.14), transparent 34%),
        linear-gradient(180deg, #0a1424 0%, #07111f 100%);
    }

    .brand img {
      display: block;
      width: min(280px, 72vw);
      max-height: 92px;
      object-fit: contain;
      margin: 0 auto;
    }

    .appFrame {
      display: block;
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      border: 0;
      background: var(--bg);
    }

    @media (min-width: 760px) {
      .brand {
        display: block;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="brand" aria-label="Simon Sports Betting">
      <img src="./ssb_full_logo_web_768.png" alt="Simon Sports Betting">
    </header>

    <iframe
      class="appFrame"
      src="https://script.google.com/macros/s/AKfycbzPrITdaAT9azpkORu3wDh9m-nQF1JyTfUjx58PDxbtjIcHZKk-7xCV9bwauTDQ6YKDHw/exec"
      title="Parlay Ticket Builder"
      allow="clipboard-read; clipboard-write">
    </iframe>
  </div>
</body>
</html>
