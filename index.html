function api(action,payload){setApiStatus("Loading " + action + "…","");return new Promise((resolve,reject)=>{const cb="__ptcb_"+Date.now()+"_"+Math.random().toString(36).slice(2);let s,done=false;function cleanScript(){if(s&&s.parentNode)s.remove();try{delete window[cb]}catch(e){window[cb]=undefined}}const t=setTimeout(()=>{if(done)return;done=true;cleanScript();setApiStatus("Apps Script API timeout.","bad");reject(Error("API timeout"))},15000);window[cb]=d=>{if(done)return;done=true;clearTimeout(t);cleanScript();resolve(d||{})};s=document.createElement("script");s.src=API+"?"+new URLSearchParams({action:action,payload:JSON.stringify(payload||{}),callback:cb,_:Date.now()});s.onerror=()=>{if(done)return;done=true;clearTimeout(t);cleanScript();setApiStatus("Apps Script API failed.","bad");reject(Error("API failed"))};document.body.appendChild(s)})}
function setApiStatus(msg,cls){let el=$("apiStatus");if(!el)return;el.textContent=msg;el.className="status "+(cls||"")}

 Shots Over",team_shots_under:"Team Shots Under",match_shots_over:"Match Shots Over",match_shots_under:"Match Shots Under",team_sot_over:"Team SOT Over",team_sot_under:"Team SOT Under",match_sot_over:"Match SOT Over",match_sot_under:"Match SOT Under",team_sot_half_over:"Team SOT Half Over",team_sot_half_under:"Team SOT Half Under",btts_yes:"BTTS Yes",btts_no:"BTTS No",manual:"Manual",void:"Void"};

let gameCache={},playerCache={},legNum=0;const $=id=>document.getElementById(id),clean=v=>String(v||"").trim(),ymd=iso=>clean(iso).replaceAll("-","");function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}function opt(v,t){return `<option value="${esc(v)}">${esc(t||v)}</option>`}function fmtTitle(o){let s=clean(o);return s.startsWith("+")?"＋"+s.slice(1):s||"Untitled"}function ticketLeague(){return $("tracker").value==="worldcup"?"WC":$("ticketLeague").value}function ticketDate(){return ymd($("date").value)}function ticketType(){return $("ticketType").value}function gameTeams(g){g=clean(g);if(g.includes("@")){let[a,h]=g.split("@");return[a,h].map(clean)}if(g.includes(" v ")){let[h,a]=g.split(" v ");return[clean(a),clean(h)]}return[]}function typeNeedsTeam(t){return !t.startsWith("player_")&&!t.startsWith("pitcher_")&&!["manual","void","draw","h1_draw","btts_yes","btts_no","total_over","total_under","h1_total_over","h1_total_under","h2_total_over","h2_total_under","match_corners_over","match_corners_under","match_cards_over","match_cards_under","match_shots_over","match_shots_under","match_sot_over","match_sot_under"].includes(t)}function typeNeedsPlayer(t){return t.startsWith("player_")||t.startsWith("pitcher_")}function typeNeedsTarget(t){return !["ml","ml_et","to_qualify","draw","h1_draw","btts_yes","btts_no","manual","void","player_double_double","player_triple_double"].includes(t)}function legLeague(div){return ticketType()==="parlay"?div.querySelector(".league").value:ticketLeague()}function legDate(div){return ticketType()==="parlay"?ymd(div.querySelector(".date").value):ticketDate()}function legGame(div){return ticketType()==="parlay"?clean(div.querySelector(".game").value):clean($("ticketGame").value)}function dateToday(){let d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}function init(){ $("date").value=dateToday(); ["tracker","ticketType","ticketLeague","date","ticketGame","odds"].forEach(id=>$(id).addEventListener("input",changed)); $("tracker").addEventListener("change",()=>{if($("tracker").value==="worldcup"){$("ticketLeagueWrap").classList.add("hide")}else{$("ticketLeagueWrap").classList.remove("hide")}loadTicketGames(true);refreshLegContexts()}); $("ticketType").addEventListener("change",()=>{refreshLegContexts();updatePreview()}); addLeg(); loadTicketGames(true); updatePreview()}function changed(){loadTicketGames(false);refreshLegContexts();updatePreview()}
function renderSelect(sel,items,placeholder){let current=sel.value;sel.innerHTML=opt("",placeholder||"Select…")+(items||[]).map(x=>typeof x==="string"?opt(x):opt(x.value,x.label||x.value)).join("");if(current&&[...sel.options].some(o=>o.value===current))sel.value=current}function loadTicketGames(auto){let l=ticketLeague(),d=ticketDate(),k=l+"|"+d;if(!l||!d)return;let sel=$("ticketGame");renderSelect(sel,[],"Loading games…");if(gameCache[k]){renderSelect(sel,gameCache[k],"Select game…");if(auto&&!sel.value&&gameCache[k][0])sel.value=gameCache[k][0].value;setApiStatus(gameCache[k].length+" games loaded.","good");refreshLegContexts();return}api("getGamesForDate",{league:l,date:d}).then(r=>{if(r.error){setApiStatus(r.error,"bad");renderSelect(sel,[],"No games loaded");return}gameCache[k]=r.games||[];renderSelect(sel,gameCache[k],gameCache[k].length?"Select game…":"No games found");if(auto&&!sel.value&&gameCache[k][0])sel.value=gameCache[k][0].value;setApiStatus(gameCache[k].length+" games loaded.",gameCache[k].length?"good":"");refreshLegContexts();updatePreview()}).catch(e=>{renderSelect(sel,[],"API failed");setApiStatus(e.message||"API failed","bad")})}function addLeg(){legNum++;let div=document.createElement("div");div.className="leg";div.dataset.num=legNum;div.innerHTML=`<div class="legTop"><div class="legTitle">LEG ${legNum}</div><button class="ghost grip" onclick="removeLeg(this)">≡</button></div><div class="row parlayOnly"><div><label>Leg Date</label><input class="date" type="date"></div><div><label>Leg League</label><select class="league"><option>MLB</option><option>NBA</option><option>WNBA</option><option>WC</option></select></div></div><div class="parlayOnly"><label>Leg Game</label><select class="game"><option value="">Select game…</option></select></div><label>Type</label><select class="type"></select><div class="row"><div><label>Team</label><select class="team"><option value="">Select team…</option></select></div><div><label>Player</label><select class="player"><option value="">Select player…</option></select></div></div><div class="row"><div><label>Target / Line</label><input class="target"></div><div><label>Label</label><input class="label"><button class="ghost" onclick="genLabel(this)">Generate Label</button></div></div>`;$("legs").appendChild(div);div.querySelector(".date").value=$("date").value;div.querySelector(".league").value=ticketLeague();div.querySelectorAll("input,select").forEach(el=>el.addEventListener("input",()=>legChanged(div)));div.querySelector(".league").addEventListener("change",()=>loadLegGames(div,true));setTypes(div);refreshLeg(div);updatePreview()}function removeLeg(btn){btn.closest(".leg").remove();renumber();updatePreview()}function renumber(){[...document.querySelectorAll(".leg")].forEach((d,i)=>d.querySelector(".legTitle").textContent="LEG "+(i+1))}function setTypes(div){let l=legLeague(div),sel=div.querySelector(".type"),cur=sel.value;sel.innerHTML=(leagueTypes[l]||leagueTypes.MLB).map(t=>opt(t,labels[t]||t)).join("");if([...sel.options].some(o=>o.value===cur))sel.value=cur}function refreshLegContexts(){document.querySelectorAll(".leg").forEach(d=>{d.querySelectorAll(".parlayOnly").forEach(x=>x.classList.toggle("hide",ticketType()!=="parlay"));if(ticketType()!=="parlay"){d.querySelector(".date").value=$("date").value;d.querySelector(".league").value=ticketLeague()}setTypes(d);refreshLeg(d)})}function legChanged(div){setTypes(div);refreshLeg(div);updatePreview()}function refreshLeg(div){let l=legLeague(div),g=legGame(div);renderTeams(div,l,g);if(ticketType()==="parlay")loadLegGames(div,false);loadPlayers(div);fieldVisibility(div)}function loadLegGames(div,auto){let l=legLeague(div),d=legDate(div),k=l+"|"+d,sel=div.querySelector(".game");if(!l||!d||!sel)return;if(gameCache[k]){renderSelect(sel,gameCache[k],"Select game…");if(auto&&!sel.value&&gameCache[k][0])sel.value=gameCache[k][0].value;renderTeams(div,l,sel.value);return}api("getGamesForDate",{league:l,date:d}).then(r=>{gameCache[k]=r.ga
