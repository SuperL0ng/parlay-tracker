<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Parlay Tracker</title>
<style>html,body{margin:0;min-height:100%;background:#cbd2dc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#374151}.boot{padding:28px 18px;text-align:center;font-weight:800;letter-spacing:.06em}</style>
</head>
<body>
<div class="boot">Loading Parlay Tracker…</div>
<script>
(async()=>{
  const base='https://raw.githubusercontent.com/ASimonSays/parlay-builder-wrapper/bf09e74e32745b42f662d46267c977866bc39f4f/index.html';
  try{
    const response=await fetch(base,{cache:'no-store'});
    if(!response.ok)throw new Error('Base app HTTP '+response.status);
    let html=await response.text();
    html=html.replace('</body>','<script src="./mlb-live-loader.js?v=31"><\/script><script src="./view-fixes.js?v=31"><\/script><script src="./navigation-links-v24.js?v=31"><\/script><script src="./manual-fields.js?v=31"><\/script></body>');
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    document.body.innerHTML='<div class="boot">Unable to load Parlay Tracker.<br><small>'+String(error.message||error)+'</small></div>';
  }
})();
</script>
</body>
</html>
