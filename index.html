<style>
:root{--font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;--txt:#111820;--mut:#566170;--gold1:#fff1b7;--gold2:#e3b556;--gold3:#9b6d25}*{box-sizing:border-box}html{min-height:100%;overflow-x:hidden;background:#cbd2dc;-webkit-text-size-adjust:100%}body{margin:0;padding:12px;min-height:100vh;overflow-x:hidden;font-family:var(--font);color:var(--txt);background:radial-gradient(circle at 50% -90px,rgba(255,255,255,.95),transparent 35%),repeating-linear-gradient(102deg,rgba(255,255,255,.2) 0,rgba(255,255,255,.2) 1px,rgba(0,0,0,.025) 1px,rgba(0,0,0,.025) 3px,transparent 3px,transparent 12px),linear-gradient(180deg,#eef1f5 0%,#c7ced8 46%,#8d98a7 100%);background-attachment:fixed}.top,.card{width:100%;max-width:100%;overflow:hidden;border-radius:10px;border:1px solid rgba(255,255,255,.78);background:linear-gradient(180deg,rgba(255,255,255,.93),rgba(224,230,238,.82) 38%,rgba(155,166,181,.72));box-shadow:inset 0 1px 0 rgba(255,255,255,.9),inset 0 -1px 0 rgba(44,52,63,.22),0 7px 16px rgba(0,0,0,.13)}.top{text-align:center;padding:15px 12px 11px;margin-bottom:12px}.logo{display:block;width:min(215px,54vw);margin:0 auto 6px;filter:drop-shadow(0 8px 12px rgba(0,0,0,.24))}.top h1{margin:0;color:#58606d;font-size:20px;font-weight:900;letter-spacing:.14em;text-shadow:0 1px 0 rgba(255,255,255,.85),0 -1px 0 rgba(0,0,0,.25)}.top p{margin:4px 0 0;color:#697381;font-size:8px;text-transform:uppercase;letter-spacing:.25em}.card{padding:13px;margin-bottom:12px}.grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;align-items:start}.full{grid-column:1/-1}label{display:block;margin:9px 0 5px;color:#596372;font-size:10px;font-weight:850;letter-spacing:.14em;text-transform:uppercase}input,select,textarea{display:block;width:100%;max-width:100%;min-width:0;border:1px solid rgba(255,255,255,.86);border-radius:8px;padding:9px 8px;font:500 14px var(--font);color:#111820;background:linear-gradient(180deg,#eef3f9,#c9d2de);box-shadow:inset 0 2px 5px rgba(0,0,0,.17),inset 0 1px 0 rgba(255,255,255,.88),0 1px 0 rgba(255,255,255,.58)}select{height:39px}#date{font-size:13px;letter-spacing:0;padding-left:6px;padding-right:6px}textarea{min-height:250px;font:12px ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre;overflow:auto}.manualInput{margin-top:7px}.help,.status,.warn{margin-top:7px;font-size:12px;line-height:1.35;color:#515b68}.status.good{color:#236122;font-weight:800}.status.bad,.warn{color:#8b3200;font-weight:800;white-space:pre-line}.btns{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}.labelBtn{margin-top:8px;width:100%;padding:11px 9px}.removeBtn{margin-top:12px;width:100%;padding:12px 10px}button{border:1px solid rgba(62,42,13,.75);border-radius:8px;padding:12px 10px;color:#130e05;background:linear-gradient(180deg,var(--gold1),var(--gold2) 48%,var(--gold3));font:900 13px var(--font);text-transform:uppercase;letter-spacing:.07em;box-shadow:inset 0 1px 0 rgba(255,255,255,.75),inset 0 -1px 0 rgba(0,0,0,.28),0 4px 8px rgba(0,0,0,.18)}button.ghost{color:#111820;border-color:rgba(105,116,130,.55);background:linear-gradient(180deg,#f8fbff,#d7dee8 48%,#7e8a99)}button.remove{color:#fff;border-color:#7a1818;background:linear-gradient(180deg,#e47c7c,#a82424 58%,#651313)}.leg{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.62)}.legHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}.legHead strong{font-size:13px;letter-spacing:.08em}.grip{display:inline-flex;align-items:center;justify-content:center;min-width:45px;height:34px;border-radius:8px;color:#111820;border:1px solid rgba(105,116,130,.55);background:linear-gradient(180deg,#f8fbff,#d7dee8 48%,#7e8a99);font-weight:900}.hide{display:none!important}.preview{padding:10px;border-radius:9px;background:linear-gradient(180deg,#f7f9fc,#d6dde7);box-shadow:inset 0 1px 4px rgba(0,0,0,.18)}.ticket{border-radius:8px;background:rgba(255,255,255,.58);padding:10px}.ticketTop{display:flex;justify-content:space-between;align-items:center;gap:8px}.title{display:inline-block;padding:5px 9px;border-radius:7px;background:linear-gradient(180deg,#ffeaa9,#dba443);font-size:18px;font-weight:900;box-shadow:0 3px 7px rgba(0,0,0,.23)}.badge{padding:5px 8px;border-radius:6px;background:#cdd5e0;font-size:10px;font-weight:900;letter-spacing:.1em}.meta{margin:8px 0;color:#687383;font-size:11px;text-transform:uppercase}.pline{display:grid;grid-template-columns:1fr auto;gap:8px;padding:7px 0;border-top:1px solid rgba(0,0,0,.08);font-size:13px}.sub{color:#6b7480;font-size:11px}@media(max-width:360px){body{padding:10px}.grid2{gap:8px}input,select,textarea{font-size:13px;padding:8px 7px}#date{font-size:12px;padding-left:4px;padding-right:4px}label{font-size:9px;letter-spacing:.1em}.card{padding:11px}.btns{gap:10px}button{font-size:12px;padding:11px 8px}}

<body>
<header class="top"><img class="logo" src="./ssb_full_logo_web_768.png" alt="Simon Sports Betting"><h1>PARLAY TRACKER</h1><p>Ticket Builder · Preview · Export</p></header>
<section class="card">
  <div class="grid2">
    <div><label>Tracker</label><select id="tracker"><option value="parlay">Parlay Tracker</option><option value="worldcup">World Cup Tracker</option></select></div>
    <div><label>Ticket Type</label><select id="ticketType"><option value="sgp">SGP</option><option value="parlay">Parlay</option><option value="straight">Straight</option></select></div>
    <div><label>Ticket Date</label><input id="date" type="text" inputmode="numeric" placeholder="YYYY-MM-DD"></div>
    <div id="ticketLeagueWrap"><label>Ticket League</label><select id="ticketLeague"><option>MLB</option><option>NBA</option><option>WNBA</option></select></div>
    <div><label>Ticket Game</label><select id="ticketGame"><option value="">Loading games…</option></select><input id="ticketGameManual" class="manualInput hide" placeholder="Manual game, e.g. NYM@ATL"><div id="apiStatus" class="status">Waiting for games…</div></div>
    <div><label>Odds / Title</label><input id="odds" placeholder="+350"></div>
  </div>
</section>
<section class="card"><strong>LEGS</strong><div id="legs"></div><button onclick="addLeg()">Add Leg</button><div id="warnings" class="warn"></div></section>
<section class="card"><div class="ticketTop"><strong>LIVE TICKET PREVIEW</strong><span id="previewStatus">updates as you edit</span></div><div id="preview" class="preview"></div></section>
<section class="card"><div class="btns"><button onclick="generate()">Generate Ticket Code</button><button class="ghost" onclick="copyOutput()">Copy Output</button></div><label>Output</label><textarea id="output"></textarea></section>
<script>
const API="https://script.google.com/macros/s/AKfycbzPrITdaAT9azpkORu3wDh9m-nQF1JyTfUjx58PDxbtjIcHZKk-7xCV9bwauTDQ6YKDHw/exec";
const $=id=>document.getElementById(id);const clean=v=>String(v||"").trim();const MAN="__manual__";
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
function opt(v,t){return `<option value="${esc(v)}">${esc(t||v)}</option>`}
function status(msg,cls){$("apiStatus").textContent=msg;$("apiStatus").className="status "+(cls||"")}
function api(action,payload){status("Loading " + action + "…","");return new Promise((res,rej)=>{const cb="__pt"+Date.now()+Math.random().toString(36).slice(2);let script,done=false;function clear(){if(script&&script.parentNode)script.remove();try{delete window[cb]}catch(e){window[cb]=undefined}}const timer=setTimeout(()=>{if(done)return;done=true;clear();status("Apps Script API timeout.","bad");rej(Error("API timeout"))},15000);window[cb]=data=>{if(done)return;done=true;clearTimeout(timer);clear();res(data||{})};script=document.createElement("script");script.src=API+"?"+new URLSearchParams({action,payload:JSON.stringify(payload||{}),callback:cb,_:Date.now()});script.onerror=()=>{if(done)return;done=true;clearTimeout(timer);clear();status("Apps Script API failed.","bad");rej(Error("API failed"))};document.body.appendChild(script)})}
const types={MLB:["ml","spread","f5_ml","f5_spread","f5_total_over","f5_total_under","team_total_over","total_over","total_under","pitcher_outs_under","pitcher_ks","pitcher_ks_under","player_hits","player_total_bases","player_runs","player_hr","player_rbi","player_walks","player_stolen_bases","player_hwsb","player_hrrbi","manual","void"],NBA:["ml","spread","h1_ml","h1_spread","team_total_over","total_over","total_under","player_points","player_rebounds","player_assists","player_points_rebounds","player_pr","player_points_assists","player_pa","player_rebounds_assists","player_ra","player_points_rebounds_assists","player_pra","player_double_double","player_triple_double","player_blocks","player_threes","manual","void"],WNBA:["ml","spread","h1_ml","h1_spread","team_total_over","total_over","total_under","player_points","player_rebounds","player_assists","player_points_rebounds","player_pr","player_points_assists","player_pa","player_rebounds_assists","player_ra","player_points_rebounds_assists","player_pra","player_double_double","player_triple_double","player_blocks","player_threes","manual","void"],WC:["ml","ml_et","to_qualify","spread","draw","h1_ml","h1_spread","h1_draw","h1_total_over","h1_total_under","h2_total_over","h2_total_under","team_total_over","team_total_under","total_over","total_under","btts_yes","btts_no","player_goal","player_goal_et","player_assist","player_goal_or_assist","player_shots","player_sot","player_fouls","player_fouls_drawn","player_tackles","player_cards","team_corners_over","team_corners_under","team_cards_over","team_cards_under","match_corners_over","match_corners_under","match_cards_over","match_cards_under","team_shots_over","team_shots_under","match_shots_over","match_shots_under","team_sot_over","team_sot_under","match_sot_over","match_sot_under","team_sot_half_over","team_sot_half_under","manual","void"]};
const label={ml:"Moneyline",ml_et:"Moneyline incl. ET",to_qualify:"To Qualify",spread:"Spread",draw:"Draw",h1_ml:"1H Moneyline",h1_spread:"1H Spread",h1_draw:"1H Draw",f5_ml:"F5 Moneyline",f5_spread:"F5 Spread",f5_total_over:"F5 Total Over",f5_total_under:"F5 Total Under",team_total_over:"Team Total Over",team_total_under:"Team Total Under",total_over:"Total Over",total_under:"Total Under",h1_total_over:"1H Total Over",h1_total_under:"1H Total Under",h2_total_over:"2H Total Over",h2_total_under:"2H Total Under",pitcher_outs_under:"Pitcher Outs Under",pitcher_ks:"Pitcher Strikeouts",pitcher_ks_under:"Pitcher Strikeouts Under",player_hits:"Player Hits",player_total_bases:"Player Total Bases",player_runs:"Player Runs",player_hr:"Player HR",player_rbi:"Player RBI",player_walks:"Player Walks",player_stolen_bases:"Player Stolen Bases",player_hwsb:"H+BB+SB",player_hrrbi:"H+R+RBI",player_points:"Player Points",player_rebounds:"Player Rebounds",player_assists:"Player Assists",player_threes:"Player 3PM",player_blocks:"Player Blocks",player_points_rebounds:"Player P+R",player_pr:"Player P+R",player_points_assists:"Player P+A",player_pa:"Player P+A",player_rebounds_assists:"Player R+A",player_ra:"Player R+A",player_points_rebounds_assists:"Player PRA",player_pra:"Player PRA",player_double_double:"Double Double",player_triple_double:"Triple Double",player_goal:"Anytime Goal",player_goal_et:"Anytime Goal incl. ET",player_assist:"Assist",player_goal_or_assist:"Goal or Assist",player_shots:"Player Shots",player_sot:"Player SOT",player_fouls:"Player Fouls",player_fouls_drawn:"Player Fouls Drawn",player_tackles:"Player Tackles",player_cards:"Player Cards",team_corners_over:"Team Corners Over",team_corners_under:"Team Corners Under",match_corners_over:"Match Corners Over",match_corners_under:"Match Corners Under",team_cards_over:"Team Cards Over",team_cards_under:"Team Cards Under",match_cards_over:"Match Cards Over",match_cards_under:"Match Cards Under",team_shots_over:"Team Shots Over",team_shots_under:"Team Shots Under",match_shots_over:"Match Shots Over",match_shots_under:"Match Shots Under",team_sot_over:"Team SOT Over",team_sot_under:"Team SOT Under",match_sot_over:"Match SOT Over",match_sot_under:"Match SOT Under",team_sot_half_over:"Team SOT Half Over",team_sot_half_under:"Team SOT Half Under",btts_yes:"BTTS Yes",btts_no:"BTTS No",manual:"Manual",void:"Void"};
const teamList={MLB:["ARI","ATH","ATL","BAL","BOS","CHC","CWS","CIN","CLE","COL","DET","HOU","KC","LAA","LAD","MIA","MIL","MIN","NYM","NYY","PHI","PIT","SD","SEA","SF","STL","TB","TEX","TOR","WSH"],NBA:["ATL","BOS","BKN","CHA","CHI","CLE","DAL","DEN","DET","GS","HOU","IND","LAC","LAL","MEM","MIA","MIL","MIN","NOP","NYK","OKC","ORL","PHI","PHX","POR","SAC","SA","TOR","UTA","WAS"],WNBA:["ATL","CHI","CON","DAL","GS","IND","LA","LV","MIN","NY","PHX","SEA","WAS"],WC:["ARG","AUS","AUT","BEL","BIH","BRA","CAN","CIV","COL","CRO","CZE","DEN","ECU","EGY","ENG","ESP","FRA","GER","GHA","HTI","IRI","IRQ","JPN","KOR","KSA","MAR","MEX","NED","NOR","NZL","PAN","PAR","POR","QAT","RSA","SCO","SEN","SUI","TUN","TUR","URU","USA"]};
let games={},players={},legCount=0;
function today(){let d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function ymd(v){return clean(v).replace(/[^0-9]/g,"").slice(0,8)}
function league(){return $("tracker").value==="worldcup"?"WC":$("ticketLeague").value}
function date(){return ymd($("date").value)}
function ttype(){return $("ticketType").value}
function getPair(sel,input){return sel.value===MAN?clean(input.value):clean(sel.value)}
function ticketGame(){return getPair($("ticketGame"),$("ticketGameManual"))}
function showManual(sel,input){input.classList.toggle("hide",sel.value!==MAN)}
function gameTeams(g){g=clean(g);if(g.includes("@")){let [a,h]=g.split("@");return [clean(a),clean(h)]}if(g.includes(" v ")){let [h,a]=g.split(" v ");return [clean(a),clean(h)]}return []}
function isPlayer(t){return t.startsWith("player_")||t.startsWith("pitcher_")}
function needsTarget(t){return !["ml","ml_et","to_qualify","draw","h1_draw","btts_yes","btts_no","manual","void","player_double_double","player_triple_double"].includes(t)}
function needsTeam(t){return !isPlayer(t)&&!["manual","void","draw","h1_draw","btts_yes","btts_no","total_over","total_under","h1_total_over","h1_total_under","h2_total_over","h2_total_under","match_corners_over","match_corners_under","match_cards_over","match_cards_under","match_shots_over","match_shots_under","match_sot_over","match_sot_under"].includes(t)}
function renderOptions(sel,items,placeholder,allowManual){let old=sel.value;sel.innerHTML=opt("",placeholder||"Select…")+(items||[]).map(x=>typeof x==="string"?opt(x):opt(x.value,x.label||x.value)).join("")+(allowManual?opt(MAN,"Manual entry…"):"");if(old&&[...sel.options].some(o=>o.value===old))sel.value=old}
function loadGames(){let l=league(),d=date(),key=l+"|"+d,sel=$("ticketGame");if(!l||!d)return;renderOptions(sel,[],"Loading games…",true);if(games[key]){renderOptions(sel,games[key],"Select game…",true);status(games[key].length+" games loaded.","good");syncLegs();return}api("getGamesForDate",{league:l,date:d}).then(r=>{if(r.error){status(r.error,"bad");renderOptions(sel,[],"No games loaded",true);return}games[key]=r.games||[];renderOptions(sel,games[key],games[key].length?"Select game…":"No games found",true);status(games[key].length+" games loaded.",games[key].length?"good":"");syncLegs();preview()}).catch(e=>{renderOptions(sel,[],"API failed",true);status(e.message||"API failed","bad")})}
function addLeg(){legCount++;let div=document.createElement("div");div.className="leg";div.innerHTML=`<div class="legHead"><strong>LEG ${legCount}</strong><span class="grip">≡</span></div><div class="grid2 parlayOnly"><div><label>Leg Date</label><input class="ldate" type="text" inputmode="numeric" placeholder="YYYY-MM-DD"></div><div><label>Leg League</label><select class="lleague"><option>MLB</option><option>NBA</option><option>WNBA</option><option>WC</option></select></div><div class="full"><label>Leg Game</label><select class="lgame"><option value="">Select game…</option></select><input class="lgameManual manualInput hide" placeholder="Manual game"></div></div><label>Type</label><select class="ltype"></select><div class="grid2"><div class="teamBox"><label>Team</label><select class="team"><option value="">Select team…</option></select><input class="teamManual manualInput hide" placeholder="Manual team code"></div><div class="playerBox"><label>Player</label><select class="player"><option value="">Select player…</option></select><input class="playerManual manualInput hide" placeholder="Manual player name"></div><div class="targetBox"><label>Target / Line</label><input class="target"></div><div class="labelBox"><label>Label</label><input class="lbl"><button class="ghost labelBtn" onclick="genLabel(this)">Generate Label</button></div></div><button class="remove removeBtn" onclick="removeLeg(this)">Remove Leg</button>`;$("legs").appendChild(div);div.querySelector(".ldate").value=$("date").value;div.querySelector(".lleague").value=league();div.querySelector(".lbl").dataset.auto="1";
  div.querySelector(".ltype").addEventListener("change",()=>{setTypes(div);refreshLeg(div);autoFillLabel(div);preview()});
  div.querySelector(".lleague").addEventListener("change",()=>{setTypes(div);loadLegGames(div);refreshLeg(div);autoFillLabel(div);preview()});
  div.querySelector(".ldate").addEventListener("change",()=>{loadLegGames(div);refreshLeg(div);autoFillLabel(div);preview()});
  div.querySelector(".lgame").addEventListener("change",()=>{showManual(div.querySelector(".lgame"),div.querySelector(".lgameManual"));refreshLeg(div);autoFillLabel(div);preview()});
  div.querySelector(".lgameManual").addEventListener("input",()=>{refreshLeg(div);autoFillLabel(div);preview()});
  div.querySelector(".team").addEventListener("change",()=>{showManual(div.querySelector(".team"),div.querySelector(".teamManual"));loadPlayers(div);autoFillLabel(div);preview()});
  div.querySelector(".teamManual").addEventListener("input",()=>{loadPlayers(div);autoFillLabel(div);preview()});
  div.querySelector(".player").addEventListener("change",()=>{showManual(div.querySelector(".player"),div.querySelector(".playerManual"));autoFillLabel(div);preview()});
  div.querySelector(".playerManual").addEventListener("input",()=>{autoFillLabel(div);preview()});
  div.querySelector(".target").addEventListener("input",()=>{autoFillLabel(div);preview()});
  div.querySelector(".lbl").addEventListener("input",e=>{e.target.dataset.auto=clean(e.target.value)?"0":"1";preview()});
setTypes(div);syncLeg(div);preview()}
function removeLeg(btn){btn.closest(".leg").remove();renumber();preview()}
function renumber(){[...document.querySelectorAll(".leg")].forEach((d,i)=>d.querySelector("strong").textContent="LEG "+(i+1))}
function legLeague(d){return ttype()==="parlay"?d.querySelector(".lleague").value:league()}
function legDate(d){return ttype()==="parlay"?ymd(d.querySelector(".ldate").value):date()}
function legGame(d){return ttype()==="parlay"?getPair(d.querySelector(".lgame"),d.querySelector(".lgameManual")):ticketGame()}
function legTeam(d){return getPair(d.querySelector(".team"),d.querySelector(".teamManual"))}
function legPlayer(d){return getPair(d.querySelector(".player"),d.querySelector(".playerManual"))}
function setTypes(d){let sel=d.querySelector(".ltype"),cur=sel.value,l=legLeague(d);sel.innerHTML=(types[l]||types.MLB).map(t=>opt(t,label[t]||t)).join("");if(cur&&[...sel.options].some(o=>o.value===cur))sel.value=cur}
function syncLegs(){document.querySelectorAll(".leg").forEach(syncLeg)}
function syncLeg(d){d.querySelectorAll(".parlayOnly").forEach(x=>x.classList.toggle("hide",ttype()!=="parlay"));if(ttype()!=="parlay"){d.querySelector(".ldate").value=$("date").value;d.querySelector(".lleague").value=league()}setTypes(d);refreshLeg(d);autoFillLabel(d)}
function refreshLeg(d){let l=legLeague(d),g=legGame(d),t=d.querySelector(".ltype").value;d.querySelector(".teamBox").classList.toggle("hide",!needsTeam(t)&&!isPlayer(t));d.querySelector(".playerBox").classList.toggle("hide",!isPlayer(t));d.querySelector(".targetBox").classList.toggle("hide",!needsTarget(t));showManual($("ticketGame"),$("ticketGameManual"));showManual(d.querySelector(".lgame"),d.querySelector(".lgameManual"));showManual(d.querySelector(".team"),d.querySelector(".teamManual"));showManual(d.querySelector(".player"),d.querySelector(".playerManual"));if(ttype()==="parlay")loadLegGames(d);renderTeams(d,l,g);loadPlayers(d)}
function loadLegGames(d){let l=legLeague(d),dt=legDate(d),key=l+"|"+dt,sel=d.querySelector(".lgame");if(!l||!dt)return;if(games[key]){renderOptions(sel,games[key],"Select game…",true);return}api("getGamesForDate",{league:l,date:dt}).then(r=>{games[key]=r.games||[];renderOptions(sel,games[key],games[key].length?"Select game…":"No games found",true)}).catch(()=>renderOptions(sel,[],"API failed",true))}
function renderTeams(d,l,g){let arr=gameTeams(g);if(!arr.length)arr=teamList[l]||[];renderOptions(d.querySelector(".team"),arr,"Select team…",true)}
function loadPlayers(d){let t=d.querySelector(".ltype").value,sel=d.querySelector(".player");if(!isPlayer(t)){renderPlayers(sel,[]);return}let l=legLeague(d),dt=legDate(d),g=legGame(d),team=legTeam(d);if(!l||!dt||!g||!team){renderPlayers(sel,[]);return}let role=t.startsWith("pitcher_")?"pitcher":"non_pitcher",key=[l,dt,g,team,role].join("|");if(players[key]){renderPlayers(sel,players[key]);return}renderOptions(sel,[],"Loading players…",true);api("getPlayersForGame",{league:l,date:dt,game:g,team,playerRole:role}).then(r=>{players[key]=r.players||[];renderPlayers(sel,players[key])}).catch(()=>renderOptions(sel,[],"API failed",true))}
function renderPlayers(sel,list){let old=sel.value;sel.innerHTML=opt("",list.length?"Select player…":"No players found")+list.map(p=>opt(p.name,[p.name,p.team,p.starter?"starter":""].filter(Boolean).join(" — "))).join("")+opt(MAN,"Manual entry…");if(old&&[...sel.options].some(o=>o.value===old))sel.value=old}
function genLabel(btn){let d=btn.closest(".leg"),lbl=d.querySelector(".lbl");lbl.value=autoLabel(d);lbl.dataset.auto="1";preview()}
function autoFillLabel(d){let lbl=d.querySelector(".lbl");if(lbl.dataset.auto!=="0")lbl.value=autoLabel(d)}
function autoLabel(d){let t=d.querySelector(".ltype").value,team=legTeam(d),player=legPlayer(d),target=clean(d.querySelector(".target").value);if(t==="manual")return clean(d.querySelector(".lbl").value);if(t==="void")return"VOID";if(t==="draw")return"Draw";if(t==="h1_draw")return"H1 Draw";if(t==="btts_yes")return"BTTS Yes";if(t==="btts_no")return"BTTS No";if(isPlayer(t)){let suf={player_hits:"H",player_total_bases:"TB",player_runs:"R",player_hr:"HR",player_rbi:"RBI",player_walks:"BB",player_stolen_bases:"SB",player_hwsb:"HWSB",player_hrrbi:"HRRBI",pitcher_ks:"K",pitcher_ks_under:"K",pitcher_outs_under:"Outs",player_points:"PTS",player_rebounds:"REB",player_assists:"AST",player_threes:"3PM",player_blocks:"BLK",player_goal:"Goal",player_goal_et:"Goal",player_assist:"Assist",player_goal_or_assist:"G/A",player_sot:"SOT",player_shots:"Shots"}[t]||label[t]||"";return [player,target?target+"+":"",suf].filter(Boolean).join(" ")}if(needsTeam(t)){if(t.includes("spread"))return team+" "+target;if(t.includes("_over")||t.includes("_under"))return team+" "+(t.includes("_under")?"U":"O")+target;return team+" "+(label[t]||t)}if(t.includes("_over")||t.includes("_under"))return (t.includes("_under")?"U":"O")+target+" "+(label[t]||"");return label[t]||t}
function title(){let s=clean($("odds").value);return s.startsWith("+")?"＋"+s.slice(1):s||"Untitled"}
function collect(){let o={title:title(),type:ttype(),tracker:$("tracker").value,date:date(),legs:[]};if(ttype()!=="parlay"){o.league=league();o.game=ticketGame()}document.querySelectorAll(".leg").forEach(d=>{let t=d.querySelector(".ltype").value,leg={label:clean(d.querySelector(".lbl").value)||autoLabel(d),type:t};if(ttype()==="parlay"){leg.date=legDate(d);leg.league=legLeague(d);leg.game=legGame(d)}let team=legTeam(d),player=legPlayer(d),target=clean(d.querySelector(".target").value);if(team)leg.team=team;if(player)leg.player=player;if(target)leg.target=isNaN(Number(target))?target:Number(target);o.legs.push(leg)});return o}
function jsVal(v){if(typeof v==="string")return JSON.stringify(v);if(Array.isArray(v))return"["+v.map(jsVal).join(", ")+"]";if(v&&typeof v==="object")return"{\n"+Object.entries(v).map(([k,val])=>"  "+k+": "+jsVal(val)).join(",\n")+"\n}";return String(v)}
function generate(){let o=collect();$("output").value="const ticket = "+jsVal(o)+";";preview()}
function copyOutput(){let v=$("output").value;if(navigator.clipboard)navigator.clipboard.writeText(v);$("previewStatus").textContent="copied"}
function preview(){let o=collect(),issues=[];if(o.title==="Untitled")issues.push("Missing odds/title");if(!o.date)issues.push("Missing date");if(ttype()!=="parlay"&&!o.game)issues.push("Missing ticket game");o.legs.forEach((l,i)=>{if(!l.label)issues.push(`Leg ${i+1}: missing label`);if(needsTeam(l.type)&&!l.team)issues.push(`Leg ${i+1}: missing team`);if(isPlayer(l.type)&&!l.player)issues.push(`Leg ${i+1}: missing player`);if(needsTarget(l.type)&&l.target==null)issues.push(`Leg ${i+1}: missing target`)});$("warnings").textContent=issues.join("\n");$("previewStatus").textContent=issues.length?issues.length+" issues":"ready";$("preview").innerHTML=`<div class="ticket"><div class="ticketTop"><span class="title">${esc(o.title)}</span><span class="badge">${esc(o.type.toUpperCase())}</span></div><div class="meta">${esc([o.game,o.date].filter(Boolean).join(" · "))}</div>${o.legs.map(l=>`<div class="pline"><div><b>${esc(l.label||"Untitled")}</b><div class="sub">${esc([l.game,l.team,l.player].filter(Boolean).join(" · "))}</div></div><div>${esc(l.target??"")}</div></div>`).join("")}</div>`}
function init(){ $("date").value=today();["tracker","ticketType","ticketLeague","date"].forEach(id=>$(id).addEventListener("change",()=>{if(id==="tracker")$("ticketLeagueWrap").classList.toggle("hide",$("tracker").value==="worldcup");loadGames();syncLegs();preview()}));$("ticketGame").addEventListener("change",()=>{showManual($("ticketGame"),$("ticketGameManual"));syncLegs();preview()});$("ticketGameManual").addEventListener("input",()=>{syncLegs();preview()});$("odds").addEventListener("input",preview);addLeg();loadGames();preview()}
window.addEventListener("load",init);
</script>
</body>
</html>
