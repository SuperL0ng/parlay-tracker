function addLeg(){legCount++;let div=document.createElement("div");div.className="leg";div.dataset.legId="leg-"+legCount;div.innerHTML=`<div class="legHead"><div class="legHeadLeft"><strong>LEG ${legCount}</strong><label class="straightPick hide"><input class="straightRadio" type="radio" name="straightActive"> Active</label></div><div class="headControls"><button class="miniRemove multiOnly" onclick="removeLeg(this)">−</button><span class="grip multiOnly" title="Drag to reorder" aria-label="Drag to reorder leg">≡</span></div></div><div class="grid2 parlayOnly"><div><label>Leg Date</label><input class="ldate" type="text" inputmode="numeric" placeholder="YYYY-MM-DD"></div><div><label>Leg League</label><select class="lleague"><option>MLB</option><option>NBA</option><option>WNBA</option><option>WC</option></select></div><div class="full"><label>Leg Game</label><select class="lgame"><option value="">Select game…</option></select><input class="lgameManual manualInput hide" placeholder="Manual game"></div></div><label>Type</label><select class="ltype"></select><div class="grid2"><div class="teamBox"><label>Team</label><select class="team"><option value="">Select team…</option></select><input class="teamManual manualInput hide" placeholder="Manual team code"></div><div class="playerBox"><label>Player</label><select class="player"><option value="">Select team first…</option></select><input class="playerManual manualInput hide" placeholder="Manual player name"></div><div class="targetBox"><label>Target / Line</label><input class="target"></div><div class="labelBox"><label>Label</label><input class="lbl"><div class="labelActions"><button class="ghost" onclick="genLabel(this)">Generate Label</button><button onclick="addLeg()">Add Leg</button></div></div></div>`;$("legs").appendChild(div);div.querySelector(".ldate").value=$("date").value;div.querySelector(".lleague").value=league();div.querySelector(".lbl").dataset.auto="1";bindLeg(div);setTypes(div);syncLeg(div);if(ttype()==="straight")straightActiveLegId=div.dataset.legId;updateMultiControls();updateStraightStates();preview()}
function bindLeg(div){div.querySelector(".straightRadio").addEventListener("change",()=>activateStraight(div));div.querySelector(".ltype").addEventListener("change",()=>{setTypes(div);refreshLeg(div);autoFillLabel(div);preview()});div.querySelector(".lleague").addEventListener("change",()=>{setTypes(div);loadLegGames(div);refreshLeg(div);autoFillLabel(div);preview()});div.querySelector(".ldate").addEventListener("change",()=>{loadLegGames(div);refreshLeg(div);autoFillLabel(div);preview()});div.querySelector(".lgame").addEventListener("change",()=>{showManual(div.querySelector(".lgame"),div.querySelector(".lgameManual"));refreshLeg(div);autoFillLabel(div);preview()});div.querySelector(".lgameManual").addEventListener("input",()=>{refreshLeg(div);autoFillLabel(div);preview()});div.querySelector(".team").addEventListener("change",()=>{showManual(div.querySelector(".team"),div.querySelector(".teamManual"));loadPlayers(div);autoFillLabel(div);preview()});div.querySelector(".teamManual").addEventListener("input",()=>{loadPlayers(div);autoFillLabel(div);preview()});div.querySelector(".player").addEventListener("change",()=>{showManual(div.querySelector(".player"),div.querySelector(".playerManual"));autoFillLabel(div);preview()});div.querySelector(".playerManual").addEventListener("input",()=>{autoFillLabel(div);preview()});div.querySelector(".target").addEventListener("input",()=>{autoFillLabel(div);preview()});div.querySelector(".lbl").addEventListener("input",e=>{e.target.dataset.auto=clean(e.target.value)?"0":"1";preview()})}
function activateStraight(div){straightActiveLegId=div.dataset.legId;updateStraightStates();preview()}
function updateStraightStates(){let legs=[...document.querySelectorAll(".leg")],straight=ttype()==="straight";if(straight&&legs.length&&!legs.some(d=>d.dataset.legId===straightActiveLegId))straightActiveLegId=legs[legs.length-1].dataset.legId;legs.forEach(d=>{let active=!straight||d.dataset.legId===straightActiveLegId;d.classList.toggle("straightInactive",straight&&!active);let pick=d.querySelector(".straightPick"),radio=d.querySelector(".straightRadio");pick.classList.toggle("hide",!straight||legs.length<2);radio.checked=straight&&active;d.querySelectorAll("input,select,button").forEach(el=>{if(el.classList.contains("straightRadio")||el.classList.contains("miniRemove"))return;el.disabled=straight&&!active})})}
function updateMultiControls(){let n=document.querySelectorAll(".leg").length;document.querySelectorAll(".multiOnly").forEach(el=>el.classList.toggle("hide",n<2));updateStraightStates()}
function removeLeg(btn){let leg=btn.closest(".leg"),wasActive=leg.dataset.legId===straightActiveLegId;leg.remove();let remaining=[...document.querySelectorAll(".leg")];if(wasActive&&remaining.length)straightActiveLegId=remaining[remaining.length-1].dataset.legId;renumber();updateMultiControls();preview()}
function moveLeg(handle){let leg=handle.closest(".leg"),parent=$("legs"),next=leg.nextElementSibling,prev=leg.previousElementSibling;if(next)parent.insertBefore(leg,next.nextSibling);else if(prev)parent.insertBefore(leg,prev);renumber();updateMultiControls();preview()}
function renumber(){[...document.querySelectorAll(".leg")].forEach((d,i)=>d.querySelector("strong").textContent="LEG "+(i+1))}
function legLeague(d){return ttype()==="parlay"?d.querySelector(".lleague").value:league()}function legDate(d){return ttype()==="parlay"?ymd(d.querySelector(".ldate").value):date()}function legGame(d){return ttype()==="parlay"?getPair(d.querySelector(".lgame"),d.querySelector(".lgameManual")):ticketGame()}function legTeam(d){return getPair(d.querySelector(".team"),d.querySelector(".teamManual"))}function legPlayer(d){return getPair(d.querySelector(".player"),d.querySelector(".playerManual"))}
function setTypes(d){let sel=d.querySelector(".ltype"),cur=sel.value,l=legLeague(d);sel.innerHTML=(types[l]||types.MLB).map(t=>opt(t,label[t]||t)).join("");if(cur&&[...sel.options].some(o=>o.value===cur))sel.value=cur}
function syncLegs(){document.querySelectorAll(".leg").forEach(syncLeg);updateStraightStates()}
function syncLeg(d){d.querySelectorAll(".parlayOnly").forEach(x=>x.classList.toggle("hide",ttype()!=="parlay"));if(ttype()!=="parlay"){d.querySelector(".ldate").value=$("date").value;d.querySelector(".lleague").value=league()}setTypes(d);refreshLeg(d);autoFillLabel(d)}
function refreshLeg(d){let l=legLeague(d),g=legGame(d),t=d.querySelector(".ltype").value;d.querySelector(".teamBox").classList.toggle("hide",!needsTeam(t)&&!isPlayer(t));d.querySelector(".playerBox").classList.toggle("hide",!isPlayer(t));d.querySelector(".targetBox").classList.toggle("hide",!needsTarget(t));showManual($("ticketGame"),$("ticketGameManual"));showManual(d.querySelector(".lgame"),d.querySelector(".lgameManual"));showManual(d.querySelector(".team"),d.querySelector(".teamManual"));showManual(d.querySelector(".player"),d.querySelector(".playerManual"));if(ttype()==="parlay")loadLegGames(d);renderTeams(d,l,g);loadPlayers(d)}
function loadLegGames(d){let l=legLeague(d),dt=legDate(d),key=l+"|"+dt,sel=d.querySelector(".lgame");if(!l||!dt)return;if(games[key]){renderOptions(sel,games[key],"Select game…",true);return}api("getGamesForDate",{league:l,date:dt}).then(r=>{games[key]=r.games||[];renderOptions(sel,games[key],games[key].length?"Select game…":"No games found",true)}).catch(()=>renderOptions(sel,[],"API failed",true))}
function renderTeams(d,l,g){let arr=gameTeams(g);if(!arr.length)arr=teamList[l]||[];renderOptions(d.querySelector(".team"),arr,"Select team…",true)}
function loadPlayers(d){let t=d.querySelector(".ltype").value,sel=d.querySelector(".player"),team=legTeam(d);if(!isPlayer(t)){renderPlayers(sel,[],"Select player…");return}let l=legLeague(d),dt=legDate(d),g=legGame(d);if(!team){renderPlayers(sel,[],"Select team first…");return}if(!l||!dt||!g){renderPlayers(sel,[],"Select game first…");return}let role=t.startsWith("pitcher_")?"pitcher":"non_pitcher",key=[l,dt,g,team,role].join("|");if(players[key]){renderPlayers(sel,players[key]);return}renderOptions(sel,[],"Loading players…",true);api("getPlayersForGame",{league:l,date:dt,game:g,team,playerRole:role}).then(r=>{players[key]=r.players||[];renderPlayers(sel,players[key])}).catch(()=>renderOptions(sel,[],"API failed",true))}
function renderPlayers(sel,list,placeholder){let old=sel.value;sel.innerHTML=opt("",placeholder||(list.length?"Select player…":"No players found"))+list.map(p=>opt(p.name,[p.name,p.team,p.starter?"starter":""].filter(Boolean).join(" — "))).join("")+opt(MAN,"Manual entry…");if(old&&[...sel.options].some(o=>o.value===old))sel.value=old}
function genLabel(btn){let d=btn.closest(".leg"),lbl=d.querySelector(".lbl");lbl.value=autoLabel(d);lbl.dataset.auto="1";preview()}function autoFillLabel(d){let lbl=d.querySelector(".lbl");if(lbl.dataset.auto!=="0")lbl.value=autoLabel(d)}
function autoLabel(d){let t=d.querySelector(".ltype").value,team=legTeam(d),player=legPlayer(d),target=clean(d.querySelector(".target").value);if(t==="manual")return clean(d.querySelector(".lbl").value);if(t==="void")return"VOID";if(t==="draw")return"Draw";if(t==="h1_draw")return"H1 Draw";if(t==="btts_yes")return"BTTS Yes";if(t==="btts_no")return"BTTS No";if(isPlayer(t)){let suf={player_hits:"H",player_total_bases:"TB",player_runs:"R",player_hr:"HR",player_rbi:"RBI",player_walks:"BB",player_stolen_bases:"SB",player_hwsb:"HWSB",player_hrrbi:"HRRBI",pitcher_ks:"K",pitcher_ks_under:"K",pitcher_outs_under:"Outs",player_points:"PTS",player_rebounds:"REB",player_assists:"AST",player_threes:"3PM",player_blocks:"BLK",player_goal:"Goal",player_goal_et:"Goal",player_assist:"Assist",player_goal_or_assist:"G/A",player_sot:"SOT",player_shots:"Shots"}[t]||label[t]||"";return[player,target?target+"+":"",suf].filter(Boolean).join(" ")}if(needsTeam(t)){if(t.includes("spread"))return team+" "+target;if(t.includes("_over")||t.includes("_under"))return team+" "+(t.includes("_under")?"U":"O")+target;return team+" "+(label[t]||t)}if(t.includes("_over")||t.includes("_under"))return(t.includes("_under")?"U":"O")+target+" "+(label[t]||"");return label[t]||t}
function displayTitle(){return clean($("odds").value)||"Untitled"}function codeTitle(){let s=clean($("odds").value);return s.startsWith("+")?"＋"+s.slice(1):s||"Untitled"}
function includedLegElements(){let legs=[...document.querySelectorAll(".leg")];return ttype()==="straight"?legs.filter(d=>d.dataset.legId===straightActiveLegId):legs}
function rawTicket(){let o={title:displayTitle(),type:ttype(),tracker:$("tracker").value,date:date(),legs:[],league:league(),game:ticketGame()};includedLegElements().forEach(d=>{let t=d.querySelector(".ltype").value,leg={label:clean(d.querySelector(".lbl").value)||autoLabel(d),type:t,league:legLeague(d),date:legDate(d),game:legGame(d)};let team=legTeam(d),player=legPlayer(d),target=clean(d.querySelector(".target").value);if(team)leg.team=team;if(player)leg.player=player;if(target)leg.target=isNaN(Number(target))?target:Number(target);o.legs.push(leg)});return o}
function canonicalTicket(){let raw=rawTicket(),out={title:codeTitle(),date:raw.date,type:raw.type,legs:[]};if(raw.type==="sgp"||raw.type==="straight"){if(raw.game)out.game=raw.game}raw.legs.forEach(l=>{let leg={label:l.label,type:l.type};if(raw.type==="parlay"){if(l.game)leg.game=l.game;if(l.date&&l.date!==raw.date)leg.date=l.date}if(l.team)leg.team=l.team;if(l.player)leg.player=l.player;if(l.target!==undefined&&l.target!==null&&l.target!=="")leg.target=l.target;out.legs.push(leg)});return out}
function jsVal(v){if(typeof v==="string")return JSON.stringify(v);if(Array.isArray(v))return"["+v.map(jsVal).join(", ")+"]";if(v&&typeof v==="object")return"{\n"+Object.entries(v).map(([k,val])=>"  "+k+": "+jsVal(val)).join(",\n")+"\n}";return String(v)}function generate(){let o=canonicalTicket();$("output").value="const ticket = "+jsVal(o)+";";preview()}function copyOutput(){let v=$("output").value;if(navigator.clipboard)navigator.clipboard.writeText(v);$("previewStatus").textContent="copied"}
function preview(){let o=rawTicket(),issues=[];if(o.title==="Untitled")issues.push("Missing odds/title");if(!o.date)issues.push("Missing date");if(o.type!=="parlay"&&!o.game)issues.push("Missing ticket game");if(o.type==="straight"&&o.legs.length!==1)issues.push("Select one active straight bet");if(o.type==="sgp"&&o.legs.some(l=>l.game&&l.game!==o.game))issues.push("SGP legs must share the ticket game");o.legs.forEach((l,i)=>{if(!l.label)issues.push(`Leg ${i+1}: missing label`);if(needsTeam(l.type)&&!l.team)issues.push(`Leg ${i+1}: missing team`);if(isPlayer(l.type)&&!l.player)issues.push(`Leg ${i+1}: missing player`);if(needsTarget(l.type)&&(l.target===undefined||l.target===null||l.target===""))issues.push(`Leg ${i+1}: missing target`);if(o.type==="parlay"&&!l.game)issues.push(`Leg ${i+1}: missing game`)});$("warnings").textContent=issues.join("\n");$("previewStatus").textContent=issues.length?issues.length+" issues":"ready";$("preview").innerHTML=`<div class="ticket"><div class="ticketTop"><span class="title">${esc(o.title)}</span><span class="badge">${esc(o.type.toUpperCase())}</span></div><div class="meta">${esc([o.game,o.date].filter(Boolean).join(" · "))}</div>${o.legs.map(l=>`<div class="pline"><div><b>${esc(l.label||"Untitled")}</b><div class="sub">${esc([l.game,l.team,l.player].filter(Boolean).join(" · "))}</div></div><div>${esc(l.target??"")}</div></div>`).join("")}</div>`}
function init(){$("date").value=today();["tracker","ticketType","ticketLeague","date"].forEach(id=>$(id).addEventListener("change",()=>{if(id==="tracker")$("ticketLeagueWrap").classList.toggle("hide",$("tracker").value==="worldcup");if(id==="ticketType"&&ttype()==="straight"){let legs=[...document.querySelectorAll(".leg")];if(legs.length)straightActiveLegId=legs[legs.length-1].dataset.legId}loadGames();syncLegs();updateMultiControls();preview()}));$("ticketGame").addEventListener("change",()=>{showManual($("ticketGame"),$("ticketGameManual"));syncLegs();preview()});$("ticketGameManual").addEventListener("input",()=>{syncLegs();preview()});$("odds").addEventListener("input",preview);addLeg();loadGames();preview()}
window.addEventListener("load",init);






/* BUILDER_REORDER_MODE_V11 */
let reorderMode=false;
let reorderLeg=null;
let reorderPointerId=null;
let reorderHoldTimer=null;
let reorderPending=null;
let reorderLockedScrollY=0;
const REORDER_HOLD_MS=280;
const REORDER_MOVE_TOLERANCE=10;
function legsArray(){return [...document.querySelectorAll('#legs > .leg')]}
function ensureReorderToolbar(){const legs=document.getElementById('legs');if(!legs)return;const card=legs.closest('.card');if(!card||document.getElementById('reorderLegsBtn'))return;const heading=card.querySelector(':scope > strong');const row=document.createElement('div');row.className='legsTitleRow';if(heading){heading.parentNode.insertBefore(row,heading);row.appendChild(heading)}else{row.innerHTML='<strong>LEGS</strong>';card.insertBefore(row,card.firstChild)}const btn=document.createElement('button');btn.id='reorderLegsBtn';btn.className='ghost reorderToggle';btn.type='button';btn.textContent='Reorder Legs';btn.addEventListener('click',()=>setReorderMode(!reorderMode));row.appendChild(btn);const hint=document.createElement('div');hint.className='reorderHint';hint.textContent='Hold any leg briefly, then drag. Use Remove to delete a leg.';row.insertAdjacentElement('afterend',hint)}
function updateReorderSummaries(){legsArray().forEach((leg,i)=>{let summary=leg.querySelector('.reorderSummary');if(!summary){summary=document.createElement('span');summary.className='reorderSummary';leg.querySelector('.legHeadLeft')?.appendChild(summary)}const lbl=clean(leg.querySelector('.lbl')?.value);summary.textContent=lbl||('Leg '+(i+1))})}
function applyReorderState(){ensureReorderToolbar();const legs=legsArray();const btn=document.getElementById('reorderLegsBtn');if(reorderMode&&legs.length<2)reorderMode=false;document.body.classList.toggle('reorderMode',reorderMode);if(btn){btn.classList.toggle('visible',legs.length>=2);btn.classList.toggle('active',reorderMode);btn.textContent=reorderMode?'Done':'Reorder Legs'}updateReorderSummaries();legs.forEach(leg=>{const remove=leg.querySelector('.miniRemove');const grip=leg.querySelector('.grip');if(remove){remove.classList.remove('hide');remove.classList.toggle('preReorderVisible',!reorderMode&&legs.length>=2);remove.disabled=false;remove.textContent=reorderMode?'Remove':'−';remove.setAttribute('aria-label','Remove leg')}if(grip){grip.classList.toggle('hide',!reorderMode||legs.length<2);grip.textContent='≡';grip.setAttribute('aria-label','Reorder leg')}leg.querySelectorAll('input,select,textarea,button').forEach(el=>{if(el.classList.contains('miniRemove'))return;el.disabled=reorderMode})});if(!reorderMode&&typeof updateStraightStates==='function')updateStraightStates()}
function setReorderMode(on){reorderMode=Boolean(on)&&legsArray().length>=2;cancelPendingReorder();clearReorderDrag();applyReorderState()}
function clearReorderTargets(){document.querySelectorAll('.leg.reorderBefore').forEach(x=>x.classList.remove('reorderBefore'))}
function cancelPendingReorder(){if(reorderHoldTimer)clearTimeout(reorderHoldTimer);reorderHoldTimer=null;reorderPending=null}
function lockReorderScroll(){reorderLockedScrollY=window.scrollY||document.documentElement.scrollTop||0;document.body.style.position='fixed';document.body.style.top=(-reorderLockedScrollY)+'px';document.body.style.left='0';document.body.style.right='0';document.body.style.width='100%';document.body.classList.add('reorderDraggingActive')}
function unlockReorderScroll(){document.body.classList.remove('reorderDraggingActive');document.body.style.position='';document.body.style.top='';document.body.style.left='';document.body.style.right='';document.body.style.width='';window.scrollTo(0,reorderLockedScrollY)}
function clearReorderDrag(){clearReorderTargets();if(reorderLeg)reorderLeg.classList.remove('reorderDragging');if(document.body.classList.contains('reorderDraggingActive'))unlockReorderScroll();reorderLeg=null;reorderPointerId=null}
function startReorderDrag(e){if(!reorderMode||(e.pointerType==='mouse'&&e.button!==0))return;if(e.target.closest('.miniRemove'))return;const leg=e.target.closest('#legs > .leg');if(!leg)return;cancelPendingReorder();reorderPending={leg,pointerId:e.pointerId,startX:e.clientX,startY:e.clientY};reorderHoldTimer=setTimeout(()=>{if(!reorderPending)return;reorderLeg=reorderPending.leg;reorderPointerId=reorderPending.pointerId;lockReorderScroll();reorderLeg.classList.add('reorderDragging');reorderLeg.setPointerCapture?.(reorderPointerId);reorderPending=null;reorderHoldTimer=null},REORDER_HOLD_MS)}
function continueReorderDrag(e){if(reorderPending&&e.pointerId===reorderPending.pointerId){const dx=e.clientX-reorderPending.startX,dy=e.clientY-reorderPending.startY;if(Math.hypot(dx,dy)>REORDER_MOVE_TOLERANCE)cancelPendingReorder();return}if(!reorderMode||!reorderLeg||e.pointerId!==reorderPointerId)return;e.preventDefault();const siblings=legsArray().filter(x=>x!==reorderLeg);clearReorderTargets();let before=null;for(const item of siblings){const r=item.getBoundingClientRect();if(before===null&&e.clientY<r.top+r.height/2)before=item}if(before){before.classList.add('reorderBefore');document.getElementById('legs').insertBefore(reorderLeg,before)}else document.getElementById('legs').appendChild(reorderLeg)}
function finishReorderDrag(e){if(reorderPending&&e.pointerId===reorderPending.pointerId){cancelPendingReorder();return}if(!reorderLeg||e.pointerId!==reorderPointerId)return;e.preventDefault();clearReorderDrag();renumber();updateReorderSummaries();preview()}
function blockTouchScrollWhileDragging(e){if(reorderLeg)e.preventDefault()}
const originalAddLegV11=window.addLeg;window.addLeg=function(){originalAddLegV11();requestAnimationFrame(()=>applyReorderState())};
const originalRemoveLegV11=window.removeLeg;window.removeLeg=function(btn){originalRemoveLegV11(btn);requestAnimationFrame(()=>applyReorderState())};
const reorderObserverV11=new MutationObserver(()=>requestAnimationFrame(applyReorderState));
window.addEventListener('load',()=>{ensureReorderToolbar();applyReorderState();const legs=document.getElementById('legs');if(legs)reorderObserverV11.observe(legs,{childList:true})});
document.addEventListener('pointerdown',startReorderDrag,{passive:true,capture:true});
document.addEventListener('pointermove',continueReorderDrag,{passive:false});
document.addEventListener('pointerup',finishReorderDrag,{passive:false});
document.addEventListener('pointercancel',finishReorderDrag,{passive:false});
document.addEventListener('touchmove',blockTouchScrollWhileDragging,{passive:false});

</script>
