          new="  async function evaluateRecord(record,games){const source=record.ticket||{},ticket={...source,__recordReferenceTime:record.savedAt||record.createdAt||record.updatedAt||''};const legs=await Promise.all((source.legs||[]).map(leg=>evalLeg(ticket,leg,games)));return{...record,__evaluated:legs}}"
