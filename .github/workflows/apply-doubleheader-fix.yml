          new_export="  window.ParlayTrackerCore={TZ,TEAM_ALIASES,clean,comps,teamMatches,findTeam,score,isSuspended,isFinal,isLive,hasStarted,outsDots,detail,scheduledCT,gameDateCT,gameId,gameStartCT,instanceValue,referenceTime,findGame,baseGameMeta,legMeta,total,opponentAbbr,linescore,f5Score,f5Complete,h1Score,h1Complete,fmtRecord,statusObj,gameScoreValue,marginForPick,f5MarginForPick,h1MarginForPick,trendClass,ticketState};"
