name: Apply MLB doubleheader binding fix

on:
  push:
    paths:
      - .github/workflows/apply-doubleheader-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply stable game-instance binding
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path, old, new):
              p=Path(path)
              s=p.read_text()
              count=s.count(old)
              if count!=1:
                  raise SystemExit(f'{path}: expected one exact match, found {count}')
              p.write_text(s.replace(old,new,1))

          core=Path('tracker-core-v51.js')
          s=core.read_text()
          old="  function findGame(games,key,ticket=null,leg=null){if(!key)return null;const [away,home]=key.split('@');let matches=(games||[]).filter(g=>findTeam(g,away)&&findTeam(g,home));const league=effectiveLeague(ticket,leg);if(league)matches=matches.filter(g=>String(g.__sport||'').toLowerCase()===league);const date=leg?.date||ticket?.date;if(date){const dm=matches.filter(g=>gameDateCT(g)===date);if(dm.length)matches=dm}if(!matches.length)return null;return matches.find(g=>!isFinal(g))||matches[0]}"
          new="""  function gameId(game){return String(game?.id||game?.uid||game?.gamePk||'').trim()}
  function gameStartCT(game){const d=new Date(game?.date||game?.gameDate||'');if(Number.isNaN(d.getTime()))return'';const parts={};new Intl.DateTimeFormat('en-US',{timeZone:TZ,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hourCycle:'h23'}).formatToParts(d).forEach(part=>{if(part.type!=='literal')parts[part.type]=part.value});return `${parts.year||''}${parts.month||''}${parts.day||''}T${parts.hour||''}${parts.minute||''}`}
  function instanceValue(ticket,leg,name){const lv=leg?.[name],tv=ticket?.[name];return lv!==undefined&&lv!==null&&lv!==''?lv:tv}
  function referenceTime(ticket,leg){const raw=instanceValue(ticket,leg,'gameSavedAt')||ticket?.__recordReferenceTime||'';const n=new Date(raw).getTime();return Number.isFinite(n)?n:null}
  function nearestByTime(matches,time){return matches.reduce((best,game)=>{const value=new Date(game?.date||'').getTime();if(!Number.isFinite(value))return best;const distance=Math.abs(value-time);return !best||distance<best.distance?{game,distance}:best},null)?.game||null}
  function findGame(games,key,ticket=null,leg=null){if(!key)return null;const [away,home]=key.split('@');let matches=(games||[]).filter(g=>findTeam(g,away)&&findTeam(g,home));const league=effectiveLeague(ticket,leg);if(league)matches=matches.filter(g=>String(g.__sport||'').toLowerCase()===league);const date=leg?.date||ticket?.date;if(date){const dm=matches.filter(g=>gameDateCT(g)===date);if(dm.length)matches=dm}if(!matches.length)return null;matches=[...matches].sort((a,b)=>new Date(a?.date||0)-new Date(b?.date||0));const wantedId=String(instanceValue(ticket,leg,'gameId')||'').trim();if(wantedId){const exact=matches.find(g=>gameId(g)===wantedId);if(exact)return exact}const wantedStart=String(instanceValue(ticket,leg,'gameStart')||'').trim();if(wantedStart){const exact=matches.find(g=>gameStartCT(g)===wantedStart);if(exact)return exact}const ordinal=Number(instanceValue(ticket,leg,'gameNumber'));if(Number.isInteger(ordinal)&&ordinal>=1&&ordinal<=matches.length)return matches[ordinal-1];if(matches.length===1)return matches[0];const ref=referenceTime(ticket,leg);if(ref!==null){const nearest=nearestByTime(matches,ref);if(nearest)return nearest}return matches[0]}"""
