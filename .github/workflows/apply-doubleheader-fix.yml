  async function fetchMLBFeed(ticket,leg){const date=leg?.date||ticket?.date,key=C.legGame(ticket,leg);if(!date||!key)return null;const pk=await resolveMLBGamePk(date,key);if(!pk)return null;return cacheRequest(mlbFeedCache,pk,()=>jsonFetch(`https://statsapi.mlb.com/api/v1.1/game/${pk}/feed/live`).catch(()=>null))}"""
