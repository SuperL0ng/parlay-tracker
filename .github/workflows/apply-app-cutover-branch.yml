name: Apply app cutover branch

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'cutover-app-to-bet'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cutover-app-to-bet
          fetch-depth: 0
      - name: Execute branch preparation script
        id: prep
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('scripts/prepare-app-cutover.sh')
          s=p.read_text()
          old="Path('scripts/verify-hosting-contract.mjs').write_text(verifier)"
          new="Path('scripts/verify-hosting-contract.mjs').write_text(verifier.lstrip(chr(92)+'\\n\\r\\t '))"
          if old not in s:
            raise SystemExit('Verifier write contract not found')
          p.write_text(s.replace(old,new,1))
          PY
          set +e
          bash scripts/prepare-app-cutover.sh > app-cutover-prep.log 2>&1
          status=$?
          cat app-cutover-prep.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload preparation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-cutover-prep-log
          path: app-cutover-prep.log
          if-no-files-found: error
      - name: Commit verified app cutover state
        if: steps.prep.outputs.status == '0'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes required."
            exit 0
          fi
          git commit -m "Prepare gold app repo for simonsports.bet"
          git push origin HEAD:cutover-app-to-bet
      - name: Fail when preparation failed
        if: steps.prep.outputs.status != '0'
        shell: bash
        run: exit 1
