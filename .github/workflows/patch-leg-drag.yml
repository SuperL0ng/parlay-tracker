name: Patch leg drag and labels

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          text = re.sub(
              r'\.grip\{color:#111820;border:1px solid rgba\(105,116,130,\.55\);background:linear-gradient\(180deg,#f8fbff,#d7dee8 48%,#7e8a99\);cursor:(?:pointer|grab);user-select:none(?:;touch-action:none;-webkit-user-select:none)?\}(?:\.leg\.dragging\{.*?\}\.leg\.dragTarget\{.*?\})?',
              '.grip{color:#111820;border:1px solid rgba(105,116,130,.55);background:linear-gradient(180deg,#f8fbff,#d7dee8 48%,#7e8a99);cursor:grab;user-select:none;touch-action:none;-webkit-user-select:none}.leg.dragging{opacity:.78;filter:none;position:relative;z-index:20}.leg.dragTarget{box-shadow:0 -3px 0 #c89232}',
              text,
              count=1,
              flags=re.S,
          )
          text = text.replace(
              'class="grip multiOnly" onclick="moveLeg(this)" title="Move leg"',
              'class="grip multiOnly" title="Drag to reorder" aria-label="Drag to reorder leg"',
          )

          label_fn = r'''function autoLabel(d){
            let t=d.querySelector(".ltype").value,
                team=legTeam(d),
                player=legPlayer(d),
                raw=clean(d.querySelector(".target").value),
                num=Number(raw),
                hasNum=raw!==""&&Number.isFinite(num),
                overLine=hasNum?String(Math.round((num-.5)*10)/10):"",
                underLine=hasNum?String(Math.round((num+.5)*10)/10):"";
            if(t==="manual")return clean(d.querySelector(".lbl").value);
            if(t==="void")return "VOID";
            if(t==="draw")return "Draw";
            if(t==="h1_draw")return "H1 Draw";
            if(t==="btts_yes")return "BTTS Yes";
            if(t==="btts_no")return "BTTS No";
            if(["ml","ml_et","to_qualify","f5_ml","h1_ml"].includes(t))return [team,label[t]||t].filter(Boolean).join(" ");
            if(t.includes("spread"))return [team,raw].filter(Boolean).join(" ");
            const isOver=t.endsWith("_over"),isUnder=t.endsWith("_under");
            if(isOver||isUnder){
              const ou=(isOver?"O":"U")+(isOver?overLine:underLine);
              const prefix=t.startsWith("team_")?team:"";
              const period=t.startsWith("f5_")?"F5 ":t.startsWith("h1_")?"H1 ":t.startsWith("h2_")?"H2 ":"";
              const stat=t.includes("corners")?"Corners":t.includes("cards")?"Cards":t.includes("shots")&&!t.includes("sot")?"Shots":t.includes("sot")?"SOT":"";
              return [prefix,period+ou,stat].filter(Boolean).join(" ");
            }
            if(isPlayer(t)){
              if(t==="pitcher_ks_under"||t==="pitcher_outs_under")return [player,"U"+underLine,t==="pitcher_ks_under"?"K":"Outs"].filter(Boolean).join(" ");
              const suf={player_hits:"H",player_total_bases:"TB",player_runs:"R",player_hr:"HR",player_rbi:"RBI",player_walks:"BB",player_stolen_bases:"SB",player_hwsb:"H+BB+SB",player_hrrbi:"H+R+RBI",pitcher_ks:"K",player_points:"PTS",player_rebounds:"REB",player_assists:"AST",player_threes:"3PM",player_blocks:"BLK",player_points_rebounds:"P+R",player_pr:"P+R",player_points_assists:"P+A",player_pa:"P+A",player_rebounds_assists:"R+A",player_ra:"R+A",player_points_rebounds_assists:"PRA",player_pra:"PRA",player_goal:"Goal",player_goal_et:"Goal",player_assist:"Assist",player_goal_or_assist:"G/A",player_sot:"SOT",player_shots:"Shots",player_fouls:"Fouls",player_fouls_drawn:"Fouls Drawn",player_tackles:"Tackles",player_cards:"Cards"}[t]||label[t]||"";
              if(t==="player_double_double"||t==="player_triple_double")return [player,label[t]].filter(Boolean).join(" ");
              return [player,raw?raw+"+":"",suf].filter(Boolean).join(" ");
            }
            return label[t]||t;
          }'''
          text, count = re.subn(
              r'function autoLabel\(d\)\{.*?\}(?=function displayTitle)',
              label_fn,
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('autoLabel function not found')

          marker = 'window.addEventListener("load",init);'
          if 'function beginLegDrag(e)' not in text:
              drag_code = r'''let dragLeg=null,dragPointerId=null;
          function beginLegDrag(e){const handle=e.target.closest('.grip');if(!handle||handle.classList.contains('hide'))return;const leg=handle.closest('.leg');if(!leg)return;e.preventDefault();dragLeg=leg;dragPointerId=e.pointerId;leg.classList.add('dragging');handle.setPointerCapture?.(e.pointerId);document.body.style.userSelect='none'}
          function moveLegDrag(e){if(!dragLeg||e.pointerId!==dragPointerId)return;e.preventDefault();const siblings=[...document.querySelectorAll('#legs > .leg')].filter(x=>x!==dragLeg);let before=null;for(const item of siblings){const r=item.getBoundingClientRect();item.classList.remove('dragTarget');if(before===null&&e.clientY<r.top+r.height/2)before=item}if(before){before.classList.add('dragTarget');$('legs').insertBefore(dragLeg,before)}else{$('legs').appendChild(dragLeg)}}
          function endLegDrag(e){if(!dragLeg||e.pointerId!==dragPointerId)return;e.preventDefault();document.querySelectorAll('.leg.dragTarget').forEach(x=>x.classList.remove('dragTarget'));dragLeg.classList.remove('dragging');dragLeg=null;dragPointerId=null;document.body.style.userSelect='';renumber();updateMultiControls();preview()}
          document.addEventListener('pointerdown',beginLegDrag,{passive:false});document.addEventListener('pointermove',moveLegDrag,{passive:false});document.addEventListener('pointerup',endLegDrag,{passive:false});document.addEventListener('pointercancel',endLegDrag,{passive:false});window.addEventListener("load",init);'''
              if marker not in text:
                  raise SystemExit('load marker not found')
              text = text.replace(marker, drag_code, 1)

          path.write_text(text, encoding='utf-8')

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Enable drag reorder and correct labels"
          git push
