name: Repair core legGame export

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - .repair-leg-game-export

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Restore core API and bust cache
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          core=Path('tracker-core-v51.js')
          s=core.read_text()
          if 'function legGame(ticket,leg)' not in s:
            raise SystemExit('legGame implementation is missing')
          old='gameDateCT,gameId,gameStartCT'
          new='gameDateCT,legGame,gameId,gameStartCT'
          if new not in s:
            if s.count(old)!=1:
              raise SystemExit(f'expected one export insertion point, found {s.count(old)}')
            s=s.replace(old,new,1)
          core.write_text(s)

          index=Path('index.html')
          s=index.read_text()
          if 'tracker-core-v51.js?v=121' not in s:
            count=s.count('tracker-core-v51.js?v=120')
            if count!=1:
              raise SystemExit(f'expected one core cache version, found {count}')
            s=s.replace('tracker-core-v51.js?v=120','tracker-core-v51.js?v=121',1)
          index.write_text(s)

          test=Path('scripts/test-doubleheader-game-binding.mjs')
          s=test.read_text()
          marker="const assert=(condition,message)=>{if(!condition)throw new Error(message)};"
          check="assert(typeof C.legGame==='function','ParlayTrackerCore.legGame must remain exported');"
          if check not in s:
            if s.count(marker)!=1:
              raise SystemExit('test insertion marker mismatch')
            s=s.replace(marker,marker+'\n'+check,1)
          test.write_text(s)
          PY

      - name: Verify repair
        shell: bash
        run: |
          node --check tracker-core-v51.js
          node scripts/test-doubleheader-game-binding.mjs
          node scripts/verify-hosting-contract.mjs
          grep -q 'gameDateCT,legGame,gameId' tracker-core-v51.js
          grep -q 'tracker-core-v51.js?v=121' index.html

      - name: Commit repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tracker-core-v51.js index.html scripts/test-doubleheader-game-binding.mjs
          git commit -m "Restore legGame core export"
          git push origin HEAD:${{ github.head_ref }}
