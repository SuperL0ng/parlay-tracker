name: Verify live dashboard V5 behavior

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - .verify-dashboard-v5-behavior

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch live V5 assets and browser test
        shell: bash
        run: |
          set -euo pipefail
          verify_domain(){
            domain="$1"
            dir="/tmp/${domain//./-}"
            mkdir -p "$dir"
            ok=0
            for attempt in $(seq 1 36); do
              nonce="$(date +%s)-$attempt"
              if curl -fsSL --max-time 30 "https://$domain/?verify=$nonce" -o "$dir/index.html" \
                && curl -fsSL --max-time 30 "https://$domain/show-legs-label-fix.js?v=5&verify=$nonce" -o "$dir/binding.js" \
                && grep -q 'show-legs-label-fix.js?v=5' "$dir/index.html" \
                && grep -q 'DASHBOARD TICKET ID BINDING V5' "$dir/binding.js" \
                && grep -q 'selectButton.click' "$dir/binding.js" \
                && node --check "$dir/binding.js"; then
                ok=1
                break
              fi
              sleep 10
            done
            test "$ok" = 1
            echo "$domain: live V5 asset verified"
          }
          verify_domain simonsports.bet
          verify_domain simonsportsbetting.com
          curl -fsSL 'https://raw.githubusercontent.com/SuperL0ng/parlay-tracker/verify-dashboard-v5-behavior/scripts/test-dashboard-v5-browser.mjs' -o test-dashboard-v5-browser.mjs
      - name: Install browser test dependency
        run: npm install --no-save jsdom@24 >/dev/null
      - name: Run four-ticket browser regression
        run: node test-dashboard-v5-browser.mjs
