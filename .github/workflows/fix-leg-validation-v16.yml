name: Fix leg validation parity

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/fix-leg-validation-v16.js
      - .github/workflows/fix-leg-validation-v16.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run parity audit and correction
        run: node .github/scripts/fix-leg-validation-v16.js
      - name: Commit validation correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Fix target validation for moneyline markets"
          git push
