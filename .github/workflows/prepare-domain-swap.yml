name: Prepare domain swap

on:
  push:
    paths:
      - .github/workflows/prepare-domain-swap.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Check out app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare dual-domain gold host and library backup
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index_path = Path('index.html')
          index = index_path.read_text()
          old = "const goldHost=location.hostname.toLowerCase()==='simonsportsbetting.com';"
          new = "const goldHost=['simonsportsbetting.com','simonsports.bet'].includes(location.hostname.toLowerCase());"
          if old in index:
              index = index.replace(old, new, 1)
          elif new not in index:
              raise SystemExit('Could not locate goldHost contract in index.html')
          index_path.write_text(index)

          backup_js = r'''/* LIBRARY_BACKUP_V1 */
          (()=>{
            'use strict';
            const PREFIX='parlayTracker.';
            const SAVED_KEY='parlayTracker.savedTickets.v1';
            const BACKUP_FORMAT='parlay-tracker-library-backup';

            function collectStorage(){
              const storage={};
              for(let i=0;i<localStorage.length;i++){
                const key=localStorage.key(i);
                if(key&&key.startsWith(PREFIX))storage[key]=localStorage.getItem(key);
              }
              return storage;
            }

            function makeBackup(){
              return {
                format:BACKUP_FORMAT,
                version:1,
                exportedAt:new Date().toISOString(),
                origin:location.origin,
                storage:collectStorage()
              };
            }

            function backupFilename(){
              const day=new Date().toISOString().slice(0,10);
              const host=(location.hostname||'parlay-tracker').replace(/[^a-z0-9.-]+/gi,'-');
              return `parlay-tracker-backup-${host}-${day}.json`;
            }

            function exportLibrary(){
              const blob=new Blob([JSON.stringify(makeBackup(),null,2)],{type:'application/json'});
              const url=URL.createObjectURL(blob);
              const a=document.createElement('a');
              a.href=url;
              a.download=backupFilename();
              document.body.appendChild(a);
              a.click();
              a.remove();
              setTimeout(()=>URL.revokeObjectURL(url),1500);
            }

            function parseTicketArray(raw){
              try{
                const parsed=JSON.parse(raw||'[]');
                return Array.isArray(parsed)?parsed:[];
              }catch(_){return[]}
            }

            function mergeSavedTickets(existingRaw,incomingRaw){
              const existing=parseTicketArray(existingRaw);
              const incoming=parseTicketArray(incomingRaw);
              const ids=new Set(existing.map(item=>item&&item.id).filter(Boolean));
              const merged=existing.slice();
              let added=0;
              for(const item of incoming){
                if(!item||typeof item!=='object')continue;
                if(item.id&&ids.has(item.id))continue;
                merged.push(item);
                if(item.id)ids.add(item.id);
                added++;
              }
              return {raw:JSON.stringify(merged),added};
            }

            function restoreLibrary(payload,mode){
              if(!payload||payload.format!==BACKUP_FORMAT||payload.version!==1||!payload.storage||typeof payload.storage!=='object'){
                throw new Error('This is not a valid Parlay Tracker library backup.');
              }
              if(mode==='replace'){
                const keys=[];
                for(let i=0;i<localStorage.length;i++){
                  const key=localStorage.key(i);
                  if(key&&key.startsWith(PREFIX))keys.push(key);
                }
                keys.forEach(key=>localStorage.removeItem(key));
              }
              let added=0;
              for(const [key,value] of Object.entries(payload.storage)){
                if(!key.startsWith(PREFIX)||typeof value!=='string')continue;
                if(mode==='merge'&&key===SAVED_KEY){
                  const result=mergeSavedTickets(localStorage.getItem(key),value);
                  localStorage.setItem(key,result.raw);
                  added+=result.added;
                }else if(mode==='replace'||localStorage.getItem(key)===null){
                  localStorage.setItem(key,value);
                }
              }
              return added;
            }

            function addStyles(){
              if(document.getElementById('libraryBackupStyles'))return;
              const style=document.createElement('style');
              style.id='libraryBackupStyles';
              style.textContent=`
                .libraryBackupBar{margin-top:12px}
                .libraryBackupBar button{width:100%}
                .libraryBackupBackdrop{position:fixed;inset:0;z-index:190;background:rgba(8,12,18,.5);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
                .libraryBackupSheet{position:fixed;left:0;right:0;bottom:0;z-index:200;padding:10px 14px calc(14px + env(safe-area-inset-bottom));border-radius:18px 18px 0 0;border:1px solid rgba(255,255,255,.85);background:linear-gradient(180deg,#f7f9fc,#c8d0db 65%,#9da8b7);box-shadow:0 -12px 30px rgba(0,0,0,.28)}
                .libraryBackupSheet strong{display:block;margin:4px 0 4px;text-align:center;color:#596372;font-size:11px;letter-spacing:.16em}
                .libraryBackupSheet p{margin:0 0 10px;color:#596372;font-size:11px;line-height:1.4;text-align:center}
                .libraryBackupSheet button{display:block;width:100%;margin-top:9px}
              `;
              document.head.appendChild(style);
            }

            function buildUi(){
              if(document.getElementById('libraryBackupBar'))return;
              const ticketList=document.getElementById('ticketList');
              if(!ticketList)return;
              addStyles();

              const bar=document.createElement('div');
              bar.id='libraryBackupBar';
              bar.className='libraryBackupBar';
              bar.innerHTML='<button id="libraryBackupOpen" class="ghost" type="button">Backup & Transfer</button>';
              ticketList.insertAdjacentElement('afterend',bar);

              const backdrop=document.createElement('div');
              backdrop.id='libraryBackupBackdrop';
              backdrop.className='libraryBackupBackdrop hide';
              backdrop.setAttribute('aria-hidden','true');

              const sheet=document.createElement('div');
              sheet.id='libraryBackupSheet';
              sheet.className='libraryBackupSheet hide';
              sheet.setAttribute('role','dialog');
              sheet.setAttribute('aria-modal','true');
              sheet.innerHTML='<div class="sheetHandle"></div><strong>BACKUP & TRANSFER</strong><p>Export the complete local ticket library or restore one from a prior backup.</p><button id="libraryExport" type="button">Export Ticket Library</button><button id="libraryImportMerge" class="ghost" type="button">Import — Merge</button><button id="libraryImportReplace" class="ghost" type="button">Import — Replace All</button><button id="libraryBackupCancel" class="ghost" type="button">Cancel</button><input id="libraryBackupFile" class="hide" type="file" accept="application/json,.json">';
              document.body.append(backdrop,sheet);

              const fileInput=sheet.querySelector('#libraryBackupFile');
              let importMode='merge';
              const close=()=>{
                sheet.classList.add('hide');
                backdrop.classList.add('hide');
                backdrop.setAttribute('aria-hidden','true');
                document.body.style.overflow='';
              };
              const open=()=>{
                sheet.classList.remove('hide');
                backdrop.classList.remove('hide');
                backdrop.setAttribute('aria-hidden','false');
                document.body.style.overflow='hidden';
              };

              bar.querySelector('#libraryBackupOpen').addEventListener('click',open);
              backdrop.addEventListener('click',close);
              sheet.querySelector('#libraryBackupCancel').addEventListener('click',close);
              sheet.querySelector('#libraryExport').addEventListener('click',()=>{exportLibrary();close()});
              sheet.querySelector('#libraryImportMerge').addEventListener('click',()=>{importMode='merge';fileInput.value='';fileInput.click()});
              sheet.querySelector('#libraryImportReplace').addEventListener('click',()=>{
                if(!confirm('Replace every Parlay Tracker ticket and local setting on this domain with the selected backup?'))return;
                importMode='replace';fileInput.value='';fileInput.click();
              });
              fileInput.addEventListener('change',async()=>{
                const file=fileInput.files&&fileInput.files[0];
                if(!file)return;
                try{
                  const payload=JSON.parse(await file.text());
                  const added=restoreLibrary(payload,importMode);
                  close();
                  if(typeof window.renderTicketDashboard==='function')window.renderTicketDashboard();
                  alert(importMode==='merge'?`Ticket library imported. ${added} new ticket${added===1?'':'s'} added.`:'Ticket library replaced from backup.');
                }catch(error){
                  alert(error&&error.message?error.message:'The ticket library could not be imported.');
                }
              });
            }

            const start=()=>buildUi();
            document.readyState==='loading'?document.addEventListener('DOMContentLoaded',start,{once:true}):start();
            new MutationObserver(buildUi).observe(document.documentElement,{subtree:true,childList:true});
          })();
          '''
          Path('library-backup.js').write_text(backup_js)

          nav_path = Path('navigation-links-v24.js')
          nav = nav_path.read_text()
          loader = "\n/* Load whole-library backup tools. */\n(()=>{if(document.querySelector('script[data-library-backup]'))return;const s=document.createElement('script');s.dataset.libraryBackup='1';s.src='./library-backup.js?v=1';document.head.appendChild(s)})();\n"
          if 'data-library-backup' not in nav:
              nav_path.write_text(nav.rstrip()+loader)
          PY

          node --check navigation-links-v24.js
          node --check library-backup.js
          node scripts/verify-hosting-contract.mjs

      - name: Commit prepared app state
        shell: bash
        run: |
          if git diff --quiet && git status --porcelain | grep -q '^??' && false; then
            exit 0
          fi
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html navigation-links-v24.js library-backup.js
          git commit -m "Prepare app for domain swap and library backup"
          git push
