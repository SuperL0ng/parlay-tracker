name: Run MLB doubleheader binding fix

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - .doubleheader-fix-trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply stable game-instance binding
        shell: bash
        run: |
          set +e
          if [ ! -f doubleheader-game-binding.js ]; then
            python3 - <<'PY'
          from pathlib import Path
          source=Path('.github/workflows/apply-doubleheader-fix.yml').read_text().splitlines()
          start=next(i for i,line in enumerate(source) if "python3 - <<'PY'" in line)+1
          end=next(i for i in range(start,len(source)) if source[i].strip()=='PY')
          lines=source[start:end]
          prefix='          '
          extracted=[line[len(prefix):] if line.startswith(prefix) else line for line in lines]
          script='\n'.join(extracted)+'\n'
          script=script.replace("s,count=re.subn(pattern,replacement+\"\\n\\n  function basketballPath\",s,count=1,flags=re.S)","s,count=re.subn(pattern,lambda _m: replacement+\"\\n\\n  function basketballPath\",s,count=1,flags=re.S)")
          script=script.replace("s,count=re.subn(pattern,basketball+\"\\n\\n  function basketballPlays\",s,count=1,flags=re.S)","s,count=re.subn(pattern,lambda _m: basketball+\"\\n\\n  function basketballPlays\",s,count=1,flags=re.S)")
          Path('/tmp/apply-doubleheader-fix.py').write_text(script)
          PY
            python3 /tmp/apply-doubleheader-fix.py > /tmp/doubleheader-patch.log 2>&1
            status=$?
          else
            echo 'Patch file already exists.' > /tmp/doubleheader-patch.log
            status=0
          fi
          cat /tmp/doubleheader-patch.log
          echo "$status" > /tmp/doubleheader-patch-status
          exit 0

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doubleheader-patch-diagnostics
          path: |
            /tmp/doubleheader-patch.log
            /tmp/apply-doubleheader-fix.py
            /tmp/doubleheader-patch-status

      - name: Enforce patch success
        shell: bash
        run: |
          test "$(cat /tmp/doubleheader-patch-status)" = "0"

      - name: Verify patch
        shell: bash
        run: |
          node scripts/verify-hosting-contract.mjs
          node --check tracker-core-v51.js
          node --check tracker-sources-v51.js
          node --check tracker-evaluator-v51.js
          node --check actual-settlement-time.js
          node --check pregame-status-correction.js
          node --check doubleheader-game-binding.js
          grep -q 'doubleheader-game-binding.js?v=1' index.html
          grep -q 'return matches\[0\]' tracker-core-v51.js
          ! grep -q "matches.find(g=>!isFinal(g))" tracker-core-v51.js

      - name: Commit fix to pull-request branch
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo 'No patch changes to commit.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html tracker-core-v51.js tracker-sources-v51.js tracker-evaluator-v51.js actual-settlement-time.js pregame-status-correction.js doubleheader-game-binding.js scripts/verify-hosting-contract.mjs
          git commit -m "Bind tickets to specific doubleheader games"
          git push origin HEAD:${{ github.head_ref }}
