name: Verify live legGame repair

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - .verify-leg-game-live

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify both live domains
        shell: bash
        run: |
          set -euo pipefail
          verify_domain(){
            domain="$1"
            dir="/tmp/${domain//./-}"
            mkdir -p "$dir"
            passed=0
            for attempt in $(seq 1 30); do
              nonce="$(date +%s)-$attempt"
              if curl -fsSL --max-time 30 "https://$domain/?verify=$nonce" -o "$dir/index.html" \
                && curl -fsSL --max-time 30 "https://$domain/tracker-core-v51.js?v=121&verify=$nonce" -o "$dir/tracker-core-v51.js" \
                && grep -q 'tracker-core-v51.js?v=121' "$dir/index.html" \
                && grep -q 'gameDateCT,legGame,gameId' "$dir/tracker-core-v51.js"; then
                passed=1
                break
              fi
              sleep 10
            done
            test "$passed" = 1
            node - "$dir/tracker-core-v51.js" "$domain" <<'NODE'
          const fs=require('node:fs');
          const vm=require('node:vm');
          const file=process.argv[2],domain=process.argv[3];
          global.window=global;
          vm.runInThisContext(fs.readFileSync(file,'utf8'),{filename:file});
          const C=global.ParlayTrackerCore;
          if(typeof C.legGame!=='function')throw new Error(`${domain}: legGame is not exported`);
          if(C.legGame({game:'TB@BOS'}, {})!=='TB@BOS')throw new Error(`${domain}: ticket game fallback failed`);
          if(C.legGame({game:'TB@BOS'}, {game:'TEX@ATL'})!=='TEX@ATL')throw new Error(`${domain}: leg game override failed`);
          console.log(`${domain}: live legGame API verified`);
          NODE
          }
          verify_domain simonsports.bet
          verify_domain simonsportsbetting.com
