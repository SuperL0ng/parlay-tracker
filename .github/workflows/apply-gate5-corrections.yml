name: Apply Gate 5 corrections

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/canonical-app-architecture'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact staged head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify live isolation and original source blobs
        run: |
          set -euo pipefail
          test "$(git rev-parse origin/main)" = "d896165380191e4b9876f2ea99386808c937ec8a"
          test "$(git hash-object app/src/index.template.html)" = "65be3f8e5cdb7cd8bddd279255d7c926027c971c"
          test "$(git hash-object app/src/scripts/dashboard-controller.js)" = "c612b36b01d5c5f904f38cebc030b89dbd73e1bc"
          test "$(git hash-object app/src/scripts/ticket-view-controller.js)" = "039008fb4e95b098b0b6f42805bf4116bd04d71a"
          test "$(git hash-object app/src/scripts/sharing-controller.js)" = "5bb8c15a1a344d08b829717927dac058c470813f"
          test "$(git hash-object app/src/styles/app.css)" = "1005fafa7c065fe900760775f1cf129542555f2a"
          test "$(git hash-object package.json)" = "b3d2f9bd09eaf64a429afcd3f7c220d10e4dbb18"
          test "$(git hash-object .gate5/apply-corrections.mjs)" = "927b0c84ef2e76e432abdb5de2c1cf8cdbd87926"
          test ! -e package-lock.json
          test ! -e .gitignore
      - name: Apply bounded corrections
        run: node .gate5/apply-corrections.mjs
      - name: Generate reproducible dependency lock
        run: npm install --package-lock-only --ignore-scripts
      - name: Install exact dependencies and browsers
        run: |
          npm ci
          npx playwright install --with-deps chromium webkit
      - name: Run complete Gate 1 through Gate 5 suite
        run: npm test
      - name: Verify generated gold and silver parity
        run: |
          set -euo pipefail
          for file in build/gold/*.js; do cmp "$file" "build/silver/$(basename "$file")"; done
          cmp build/gold/app.css build/silver/app.css
          cmp build/gold/dashboard.css build/silver/dashboard.css
      - name: Remove one-use correction machinery
        run: rm -rf .gate5 .github/workflows/apply-gate5-corrections.yml
      - name: Commit only verified source and lock changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitignore package.json package-lock.json \
            app/src/index.template.html \
            app/src/scripts/dashboard-controller.js \
            app/src/scripts/ticket-view-controller.js \
            app/src/scripts/sharing-controller.js \
            app/src/styles/app.css
          git add -A .gate5 .github/workflows/apply-gate5-corrections.yml
          git diff --cached --name-only | tee gate5-correction-paths.txt
          bad="$(git diff --cached --name-only | grep -Ev '^(\.gitignore|package\.json|package-lock\.json|app/src/index\.template\.html|app/src/scripts/(dashboard-controller|ticket-view-controller|sharing-controller)\.js|app/src/styles/app\.css|\.gate5/apply-corrections\.mjs|\.github/workflows/apply-gate5-corrections\.yml)$' || true)"
          test -z "$bad"
          git commit -m "Correct Gate 5 browser and mobile behavior"
          git push origin HEAD:agent/canonical-app-architecture
