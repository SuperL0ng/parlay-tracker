name: Apply Gate 6 legacy cleanup

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'agent/canonical-app-architecture'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact staged head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Verify staging boundary and live isolation
        run: |
          set -euo pipefail
          test "$(git rev-parse origin/main)" = "d896165380191e4b9876f2ea99386808c937ec8a"
          git merge-base --is-ancestor d385f0e4b5784b84670a61a050f9593032f075da HEAD
          git diff --name-only d385f0e4b5784b84670a61a050f9593032f075da...HEAD | sort > gate6-staged-paths.txt
          printf '%s\n' '.gate6/apply-cleanup.mjs' '.github/workflows/apply-gate6-cleanup.yml' | sort > gate6-expected-staged-paths.txt
          cmp gate6-staged-paths.txt gate6-expected-staged-paths.txt
      - name: Apply bounded removal and documentation update
        id: cleanup
        run: |
          set +e
          node .gate6/apply-cleanup.mjs > gate6-cleanup.log 2>&1
          status=$?
          cat gate6-cleanup.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload cleanup diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate6-cleanup-diagnostic
          retention-days: 14
          path: gate6-cleanup.log
          if-no-files-found: error
      - name: Require successful cleanup application
        if: steps.cleanup.outputs.status != '0'
        run: exit 1
      - name: Install exact test runtime
        run: |
          npm ci
          npx playwright install --with-deps chromium webkit
      - name: Stage final tree and verify cleanup contract
        run: |
          set -euo pipefail
          git add -A
          test -z "$(git ls-files '.github/**')"
          test -z "$(git ls-files 'build/**')"
          npm run verify:cleanliness
          git diff --cached --check
      - name: Run complete Gate 1 through Gate 6 suite
        run: npm test
      - name: Verify generated build parity
        run: |
          set -euo pipefail
          for file in build/gold/*.js; do cmp "$file" "build/silver/$(basename "$file")"; done
          cmp build/gold/app.css build/silver/app.css
          cmp build/gold/dashboard.css build/silver/dashboard.css
      - name: Commit verified canonical source tree
        run: |
          set -euo pipefail
          test -z "$(git status --porcelain | grep -E '^\?\?' || true)"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Remove legacy runtime and close canonical source architecture"
          git push origin HEAD:agent/canonical-app-architecture
